<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE OS — Initialize Operative</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #050810;
            --bg2:      #080d1a;
            --accent:   #6366f1;
            --accent2:  #22d3ee;
            --success:  #10b981;
            --danger:   #f43f5e;
            --text:     #e2e8f0;
            --text-dim: #64748b;
            --border:   rgba(99,102,241,0.2);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
            pointer-events: none; z-index: 9999;
        }

        .auth-wrap {
            width: 100%; max-width: 440px;
            padding: 2rem;
            position: relative; z-index: 10;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 6px;
        }
        .logo-text span { color: var(--accent); }
        .logo-sub {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.58rem;
            color: var(--text-dim);
            letter-spacing: 3px;
            margin-top: 4px;
        }

        .card {
            background: rgba(8, 13, 26, 0.85);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.2rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 60px rgba(99,102,241,0.08), inset 0 1px 0 rgba(255,255,255,0.04);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), transparent);
            opacity: 0.6;
        }

        .card-title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 3px;
            color: var(--accent2);
            margin-bottom: 1.6rem;
            display: flex; align-items: center; gap: 8px;
        }
        .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        label {
            display: block;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.58rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 5px;
        }

        input[type=text], input[type=password], input[type=email] {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-family: 'Exo 2', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            margin-bottom: 1rem;
        }
        input:focus {
            border-color: var(--accent);
            background: rgba(99,102,241,0.06);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent2), #0ea5e9);
            border: none;
            color: #000;
            padding: 0.9rem;
            border-radius: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 0.4rem;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(34,211,238,0.4);
        }

        .error-box {
            background: rgba(244,63,94,0.1);
            border: 1px solid rgba(244,63,94,0.3);
            border-radius: 8px;
            padding: 0.7rem 1rem;
            margin-bottom: 1rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            color: var(--danger);
        }
        .error-box ul { list-style: none; }
        .error-box li::before { content: '▸ '; }

        .hint {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.58rem;
            color: var(--text-dim);
            margin-top: -0.7rem;
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
        }

        .footer-link {
            text-align: center;
            margin-top: 1.4rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.62rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        .footer-link a { color: var(--accent); text-decoration: none; }
        .footer-link a:hover { color: var(--accent2); }

        .glow-blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.1; pointer-events: none; }
        .glow-blob.a { width: 350px; height: 350px; background: var(--accent2); top: -80px; left: -80px; }
        .glow-blob.b { width: 300px; height: 300px; background: var(--accent); bottom: -80px; right: -80px; }
    </style>
</head>
<body>
    <div class="glow-blob a"></div>
    <div class="glow-blob b"></div>

    <div class="auth-wrap">
        <div class="logo">
            <div class="logo-text">CORE <span>OS</span></div>
            <div class="logo-sub">OPERATIVE INITIALIZATION PROTOCOL</div>
        </div>

        <div class="card">
            <div class="card-title">&#9679; CREATE_OPERATIVE_PROFILE</div>

            {% if errors %}
            <div class="error-box">
                <ul>{% for e in errors %}<li>{{ e }}</li>{% endfor %}</ul>
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('auth.register') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <label>OPERATIVE_ID (username)</label>
                <input type="text" name="username" value="{{ form.get('username','') }}"
                       placeholder="3–32 chars, letters/numbers/underscores" autocomplete="username" autofocus required>
                <div class="hint">This will be your login identity.</div>

                <label>COMM_CHANNEL (email)</label>
                <input type="email" name="email" value="{{ form.get('email','') }}"
                       placeholder="operative@domain.com" autocomplete="email" required>

                <label>ACCESS_KEY (password)</label>
                <input type="password" name="password" placeholder="Minimum 8 characters"
                       autocomplete="new-password" required>

                <label>CONFIRM_ACCESS_KEY</label>
                <input type="password" name="confirm" placeholder="Repeat password"
                       autocomplete="new-password" required>

                <button type="submit" class="btn">INITIALIZE OPERATIVE →</button>
            </form>

            <div class="footer-link">
                ALREADY REGISTERED? <a href="{{ url_for('auth.login') }}">AUTHENTICATE</a><br><br><a href="{{ url_for('legal.privacy') }}">Privacy Policy</a> &nbsp;·&nbsp; <a href="{{ url_for('legal.terms') }}">Terms</a>
            </div>
        </div>
    </div>
</body>
</html>
