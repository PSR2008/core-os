<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE OS — 404 NODE NOT FOUND</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@700&family=Exo+2:wght@400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --accent:#6366f1; --accent2:#22d3ee; --danger:#f43f5e; --text:#e2e8f0; --dim:#64748b; }
        body {
            background: #050810;
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
            pointer-events: none; z-index: 9999;
        }
        .wrap {
            text-align: center;
            padding: 2rem;
            position: relative; z-index: 10;
        }
        .error-code {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(5rem, 20vw, 10rem);
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            text-shadow: 0 0 60px rgba(99,102,241,0.4);
            letter-spacing: -4px;
        }
        .error-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: var(--danger);
            letter-spacing: 4px;
            margin: 1rem 0 0.5rem;
        }
        .error-msg {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--dim);
            letter-spacing: 1px;
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }
        .back-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: #fff;
            padding: 0.8rem 2rem;
            border-radius: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .back-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.45); }
        .glow { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.08; pointer-events: none; }
        .glow.a { width: 500px; height: 500px; background: var(--accent); top: -150px; right: -150px; }
        .glow.b { width: 350px; height: 350px; background: var(--danger); bottom: -100px; left: -100px; }
    </style>
</head>
<body>
    <div class="glow a"></div>
    <div class="glow b"></div>
    <div class="wrap">
        <div class="error-code">404</div>
        <div class="error-label">&#9888; NODE_NOT_FOUND</div>
        <div class="error-msg">
            The requested endpoint does not exist in the CORE OS network.<br>
            Signal lost. No route to target.
        </div>
        <a href="{{ url_for('dashboard.index') }}" class="back-btn">RETURN TO DASHBOARD</a>
    </div>
</body>
</html>
